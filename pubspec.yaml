name: diakron_collection_center
description: "Diakron Collection Center"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  intl: any
  json_annotation: ^4.11.0
  logger: ^2.7.0
  open_filex: ^4.7.0
  provider: ^6.1.5+1
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/